- name: Install dependencies for Ollama
  apt:
    name:
      - curl
    state: present
    update_cache: yes

- name: Install Ollama (official script)
  shell: curl -fsSL https://ollama.com/install.sh | sh
  args:
    creates: /usr/local/bin/ollama
    executable: /bin/bash

- name: Ensure systemd override directory exists
  file:
    path: /etc/systemd/system/ollama.service.d
    state: directory
    mode: '0755'

- name: Configure Ollama systemd service (performance tuning)
  copy:
    dest: /etc/systemd/system/ollama.service.d/override.conf
    mode: '0644'
    content: |
      [Service]
      Environment="OLLAMA_HOST=0.0.0.0:11434"
      
      # GPU selection (optional – only if multiple GPUs exist)
      # Environment="CUDA_VISIBLE_DEVICES=0"

      # Concurrency tuning (important for 6GB VRAM)
      Environment="OLLAMA_NUM_PARALLEL=1"
      Environment="OLLAMA_MAX_LOADED_MODELS=1"

      # KV cache optimization (safe choice for low VRAM)
      Environment="OLLAMA_KV_CACHE_TYPE=q4_0"

      # Optional performance feature (safe if supported, ignored otherwise)
      Environment="OLLAMA_FLASH_ATTENTION=1"

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable and restart Ollama service
  systemd:
    name: ollama
    enabled: yes
    state: restarted

- name: Wait for Ollama API to be ready
  uri:
    url: http://localhost:11434/api/tags
    status_code: 200
  register: ollama_check
  retries: 10
  delay: 3
  until: ollama_check.status == 200

- name: Show Ollama status
  debug:
    msg: "Ollama API status: OK"
