- name: Install dependencies for Ollama
  apt:
    name:
      - curl
    state: present
    update_cache: yes

- name: Install Ollama (official script)
  shell: curl -fsSL https://ollama.com/install.sh | sh
  args:
    creates: /usr/local/bin/ollama

- name: Ensure systemd override directory exists
  file:
    path: /etc/systemd/system/ollama.service.d
    state: directory
    mode: '0755'

- name: Configure Ollama GPU + performance tuning
  copy:
    dest: /etc/systemd/system/ollama.service.d/override.conf
    content: |
      [Service]
      Environment="CUDA_VISIBLE_DEVICES=0"
      Environment="OLLAMA_NUM_PARALLEL=1"
      Environment="OLLAMA_MAX_LOADED_MODELS=1"
      Environment="OLLAMA_KV_CACHE_TYPE=q4_0"
      Environment="OLLAMA_FLASH_ATTENTION=1"

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable and restart Ollama service
  systemd:
    name: ollama
    enabled: yes
    state: restarted

- name: Verify Ollama API availability
  uri:
    url: http://localhost:11434/api/tags
    status_code: 200
  register: ollama_check
  retries: 5
  delay: 3
  ignore_errors: yes

- name: Show Ollama status
  debug:
    msg: >
      Ollama API status: {{ 'OK' if ollama_check.status == 200 else 'NOT READY' }}
