- name: Update apt cache
  apt:
    update_cache: yes

- name: Install packages
  apt:
    name:
      - sudo
      - curl
      - htop
      - rsync
      - borgbackup
    state: present

- name: Create users
  user:
    name: "{{ item.name }}"
    shell: /bin/bash
    create_home: yes
  loop: "{{ users }}"
