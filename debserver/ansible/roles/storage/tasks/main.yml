- name: Create shared group
  group:
    name: shared
    state: present

- name: Add users to shared group
  user:
    name: "{{ item.name }}"
    groups: shared
    append: yes
  loop: "{{ users }}"

- name: Create base /srv structure
  file:
    path: /srv
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create shared directory
  file:
    path: /srv/shared
    state: directory
    owner: root
    group: shared
    mode: "2775"

- name: Create /srv/backups
  file:
    path: /srv/backups
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create per-user backup directories
  file:
    path: "/srv/backups/{{ item.name }}"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ users }}"
