- name: Remove CUDA toolkit
  ansible.builtin.apt:
    name:
      - nvidia-cuda-toolkit
    state: absent
    purge: true

- name: Clean CUDA related leftovers (optional directories)
  ansible.builtin.file:
    path: /usr/local/cuda
    state: absent

- name: Clean CUDA samples (if installed)
  ansible.builtin.file:
    path: ~/NVIDIA_CUDA-*
    state: absent
  failed_when: false

- name: Refresh dynamic linker cache
  ansible.builtin.command: ldconfig
  changed_when: true

- name: Verify CUDA is removed (nvcc check)
  ansible.builtin.command: nvcc --version
  register: cuda_check
  changed_when: false
  failed_when: false

- name: Show CUDA removal status
  ansible.builtin.debug:
    var: cuda_check.stdout_lines