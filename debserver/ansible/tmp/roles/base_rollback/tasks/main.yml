- name: Disable fail2ban service
  systemd:
    name: fail2ban
    enabled: no
    state: stopped
  ignore_errors: yes

- name: Remove fail2ban
  apt:
    name: fail2ban
    state: absent
    purge: yes

- name: Remove fail2ban config
  file:
    path: /etc/fail2ban/jail.local
    state: absent

- name: Disable nftables service
  systemd:
    name: nftables
    enabled: no
    state: stopped
  ignore_errors: yes

- name: Flush nftables rules
  command: nft flush ruleset
  ignore_errors: yes

- name: Remove nftables config
  file:
    path: /etc/nftables.conf
    state: absent

- name: Remove unattended upgrades config
  file:
    path: /etc/apt/apt.conf.d/20auto-upgrades
    state: absent

- name: Remove base packages
  apt:
    name:
      - curl
      - rsync
      - htop
      - nano
    state: absent
    autoremove: yes
    
- name: Remove Debian contrib/non-free repositories
  ansible.builtin.apt_repository:
    repo: "deb http://deb.debian.org/debian/ trixie main contrib non-free non-free-firmware"
    state: absent

- name: Remove Debian security repository with contrib/non-free
  ansible.builtin.apt_repository:
    repo: "deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware"
    state: absent

- name: Remove Debian updates repository with contrib/non-free
  ansible.builtin.apt_repository:
    repo: "deb http://deb.debian.org/debian/ trixie-updates main contrib non-free non-free-firmware"
    state: absent

- name: Restore minimal Debian repo (main only)
  ansible.builtin.apt_repository:
    repo: "deb http://deb.debian.org/debian/ trixie main non-free-firmware"
    state: present

- name: Update apt cache after repo rollback
  ansible.builtin.apt:
    update_cache: yes
