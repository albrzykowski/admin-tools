- name: Remove Samba share configuration
  blockinfile:
    path: /etc/samba/smb.conf
    state: absent
    block: |
      [data]
      path = /data
      browseable = yes
      read only = no
      guest ok = yes
      force user = root

- name: Restart Samba service
  systemd:
    name: smbd
    state: restarted
    enabled: no
  ignore_errors: yes

- name: Stop Samba service
  systemd:
    name: smbd
    state: stopped
  ignore_errors: yes

- name: Remove Samba package
  apt:
    name: samba
    state: absent
    purge: yes

- name: Autoremove dependencies
  apt:
    autoremove: yes
