- name: AI workstation setup (Debian + NVIDIA + Ollama)
  hosts: local
  become: yes

  tasks:

    - name: Update system
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install NVIDIA driver + CUDA tools
      apt:
        name:
          - nvidia-driver
          - firmware-misc-nonfree
          - nvidia-cuda-toolkit
        state: present

    - name: Install base tools
      apt:
        name:
          - curl
          - git
          - htop
        state: present

    - name: Install Ollama
      shell: curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama
